name: activemy_flutter
description: AI-powered outdoor event aggregator for Malaysia.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.0
  firebase_storage: ^11.6.0
  google_maps_flutter: ^2.6.0
  geoflutterfire_plus: ^0.0.21
  geolocator: ^11.0.0
  url_launcher: ^6.2.6
  http: ^1.2.1
  provider: ^6.1.2
  go_router: ^14.1.4
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.1.2
  fl_chart: ^0.68.0
  webview_flutter: ^4.7.0
  google_sign_in: ^6.2.1
  map_launcher: ^4.5.0
  flutter_svg: ^2.3.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon_padded_rounded.png"
    background_color: "#FFFFFF"
    theme_color: "#e34e06"
  image_path: "assets/images/app_icon_padded_rounded.png"
  adaptive_icon_background: "#e34e06"
  adaptive_icon_foreground: "assets/images/app_icon_padded.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
